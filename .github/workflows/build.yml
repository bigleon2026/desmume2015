name: Build desmume2015 WASM (libretro)

# ADR-0033: Self-build desmume2015 fork for NDS WASM.
# Triggers on tags matching v* — produces a release asset containing the
# libretro-standard _libretro.js + _libretro.wasm pair, plus a sha256 sidecar
# and a build-info.json metadata file. LeonEmu's fetch-nds-core-prebuilt.ps1
# pulls these via jsDelivr (cdn.jsdelivr.net/gh/bigleon2026/desmume2015@<tag>).
#
# Pipeline (corrected after first CI run failed with "only .bc emitted"):
# libretro core Makefiles produce *_libretro_emscripten.bc (LLVM bitcode) only.
# The final wasm+js link step requires RetroArch's Makefile.emscripten, which
# bundles the libretro frontend (input/video/audio drivers) and the emcc link
# recipe. This matches how LeonEmu's existing mgba/fceumm/snes9x/gpgx cores
# were produced upstream by arianrhodsandlot/retroarch-emscripten-build.
#
# Emscripten version is pinned to 3.1.46 (libretro official; see ADR-0033 D4).
# Runner is ubuntu-22.04 (free for public repos; ADR-0033 D6).
# RetroArch submodule is NOT used; CI clones RetroArch separately to keep
# the fork repo clean.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    env:
      EMSCRIPTEN_VERSION: '3.1.46'
      RETROARCH_REF: 'master'

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show fork HEAD + patches
        run: |
          echo "=== fork HEAD ==="
          git log --oneline -8
          echo "=== upstream base ==="
          git log --oneline -1 06ae965~1 || true

      - name: Checkout RetroArch (for Makefile.emscripten + frontend)
        uses: actions/checkout@v4
        with:
          repository: libretro/RetroArch
          ref: ${{ env.RETROARCH_REF }}
          path: RetroArch
          fetch-depth: 1

      - name: Setup Emscripten ${{ env.EMSCRIPTEN_VERSION }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSCRIPTEN_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Verify emcc version (γ-c precheck)
        env:
          EXPECTED_EMCC: ${{ env.EMSCRIPTEN_VERSION }}
        run: |
          emcc --version
          # bash double-quoted string so $EXPECTED_EMCC expands; escape the dots.
          PATTERN="emcc.*$(echo "$EXPECTED_EMCC" | sed 's/\./\\./g')"
          emcc --version | head -1 | grep -E "$PATTERN" \
            || { echo "ERROR: emcc not $EXPECTED_EMCC — ADR-0033 D4 violation"; exit 1; }

      - name: Step 1 — Build desmume2015 libretro core (.bc only)
        run: |
          cd desmume
          emmake make -f Makefile.libretro platform=emscripten \
            EMULATORJS_THREADS=1 \
            -j$(nproc)
          echo "=== core build artifacts ==="
          ls -la *.bc
          test -f desmume2015_libretro_emscripten.bc \
            || { echo 'ERROR: .bc not produced'; exit 1; }

      - name: Step 2 — Stage .bc into RetroArch + link wasm via Makefile.emscripten
        run: |
          # Standard libretro pattern: cp <core>_libretro_emscripten.bc RetroArch/libretro_emscripten.bc
          # then `emmake make -f Makefile.emscripten LIBRETRO=<core>`.
          cp desmume/desmume2015_libretro_emscripten.bc RetroArch/libretro_emscripten.bc
          cd RetroArch
          # pthread + rwebaudio (no PROXY_TO_PTHREAD — incompatible with RWEBAUDIO).
          # LeonEmu serves COOP/COEP headers so SharedArrayBuffer is available.
          emmake make -f Makefile.emscripten \
            LIBRETRO=desmume2015 \
            HAVE_THREADS=1 \
            PROXY_TO_PTHREAD=0 \
            HAVE_RWEBAUDIO=1 \
            HAVE_AUDIOWORKLET=0 \
            HAVE_AL=0 \
            -j$(nproc)
          echo "=== link artifacts ==="
          ls -la desmume2015_libretro.js desmume2015_libretro.wasm
          test -f desmume2015_libretro.js -a -f desmume2015_libretro.wasm \
            || { echo 'ERROR: link did not produce expected wasm+js pair'; ls -la; exit 1; }

      - name: Step 3 — Stage release dir (normalized names)
        run: |
          mkdir -p release
          cp RetroArch/desmume2015_libretro.js release/
          cp RetroArch/desmume2015_libretro.wasm release/
          ls -la release/

      - name: γ-a Verify WASM magic bytes
        run: |
          WASM=release/desmume2015_libretro.wasm
          MAGIC=$(xxd -l 4 -p "$WASM")
          echo "magic = $MAGIC"
          [ "$MAGIC" = "0061736d" ] \
            || { echo "ERROR: bad wasm magic (expected 0061736d, got $MAGIC)"; exit 1; }

      - name: γ-b Verify size > WASM_STUB_MAX_BYTES (1024)
        run: |
          WASM=release/desmume2015_libretro.wasm
          SIZE=$(stat -c%s "$WASM")
          echo "size = $SIZE bytes"
          [ "$SIZE" -gt 1024 ] \
            || { echo "ERROR: wasm size $SIZE <= 1024 — stub or empty build"; exit 1; }

      - name: γ-c Verify emcc version baked (non-blocking)
        run: |
          WASM=release/desmume2015_libretro.wasm
          JS=release/desmume2015_libretro.js
          # Note: emscripten's version string is often stripped at -O3 + closure,
          # so this check is informational, not gating. The sha256 content lock
          # in fetch-nds-core-prebuilt.ps1 + libretro export symbol check (γ-d)
          # are the real integrity gates.
          if strings "$WASM" | grep -q "$EMSCRIPTEN_VERSION"; then
            echo "OK: emcc $EMSCRIPTEN_VERSION found in wasm"
          elif grep -q "$EMSCRIPTEN_VERSION" "$JS"; then
            echo "OK: emcc $EMSCRIPTEN_VERSION found in js glue"
          else
            echo "::warning::emcc $EMSCRIPTEN_VERSION not found in build output (likely stripped by -O3); continuing"
            strings "$WASM" | grep -E 'emscripten|clang|Emscripten' | head -5
          fi

      - name: γ-d Verify link integrity (RetroArch-style build profile)
        run: |
          WASM=release/desmume2015_libretro.wasm
          JS=release/desmume2015_libretro.js
          SIZE=$(stat -c%s "$WASM")
          # RetroArch Makefile.emscripten builds export the frontend (_main,
          # _cmd_*, EmscriptenSendCommand) but NOT retro_* — those are
          # internal frontend→core calls resolved at link time, so they
          # do not appear in the wasm export table. Switching to checks
          # appropriate for the RetroArch-link profile:
          #   1. wasm is meaningfully large (> 100 KiB; a real RetroArch +
          #      core build is multi-megabyte; anything < 100KB is stub)
          #   2. js glue carries the EXPORT_NAME factory (libretro_desmume2015)
          #   3. js glue references a known RetroArch symbol (EmscriptenSendCommand)
          echo "size = $SIZE bytes"
          [ "$SIZE" -gt 102400 ] \
            || { echo "ERROR: wasm $SIZE too small — expected > 100KB for RetroArch-link build"; exit 1; }

          grep -q 'libretro_desmume2015' "$JS" \
            || { echo "ERROR: EXPORT_NAME libretro_desmume2015 missing from js"; exit 1; }
          echo "OK: EXPORT_NAME present"

          grep -q 'EmscriptenSendCommand' "$JS" \
            || { echo "ERROR: RetroArch frontend symbol EmscriptenSendCommand missing from js"; exit 1; }
          echo "OK: RetroArch frontend linked"

          # Optional: if wabt+wasm-objdump happen to show retro_* as exports
          # (some link profiles do export them), report it as bonus.
          sudo apt-get update -qq && sudo apt-get install -y -qq wabt >/dev/null 2>&1 || true
          if command -v wasm-objdump >/dev/null 2>&1; then
            REXPORT=$(wasm-objdump -x "$WASM" | grep -oE 'retro_[a-z_]+' | sort -u | head -5 || true)
            if [ -n "$REXPORT" ]; then
              echo "Bonus: retro_* exports visible in wasm export table:"
              echo "$REXPORT"
            else
              echo "(retro_* not in export table — expected for RetroArch-link profile)"
            fi
          fi

      - name: γ-e Compute SHA256 sidecar
        run: |
          cd release
          zip -j desmume2015_libretro.zip desmume2015_libretro.js desmume2015_libretro.wasm
          SHA=$(sha256sum desmume2015_libretro.zip | awk '{print $1}')
          echo "$SHA" > desmume2015_libretro.zip.sha256
          echo "=== sha256 ==="
          cat desmume2015_libretro.zip.sha256
          echo "SHA256=$SHA" >> $GITHUB_ENV

      - name: γ-f Emit build-info.json
        run: |
          UPSTREAM_BASE=$(git rev-parse 06ae965~1)
          FORK_HEAD=$(git rev-parse HEAD)
          cat > release/build-info.json <<EOF
          {
            "core": "desmume2015",
            "platform": "nds",
            "upstream_repo": "https://github.com/libretro/desmume2015",
            "upstream_base_sha": "$UPSTREAM_BASE",
            "fork_repo": "https://github.com/bigleon2026/desmume2015",
            "fork_head_sha": "$FORK_HEAD",
            "retroarch_repo": "https://github.com/libretro/RetroArch",
            "retroarch_ref": "$RETROARCH_REF",
            "emscripten_version": "$EMSCRIPTEN_VERSION",
            "patches": [
              {
                "sha_local": "06ae965",
                "ref_upstream": "EmulatorJS/desmume2015@b512e1220085ed98966a9d6a4920e4727281bdb2",
                "description": "use -O3 instead of -O2 for emscripten platform"
              },
              {
                "sha_local": "5996c2c",
                "ref_upstream": "EmulatorJS/desmume2015@b4ae0af744cf8f7895f3586ece449f876f3142e6",
                "description": "add optional EMULATORJS_THREADS pthread toggle"
              }
            ],
            "build_options": {
              "platform": "emscripten",
              "EMULATORJS_THREADS": "0",
              "LIBRETRO": "desmume2015",
              "HAVE_THREADS": "0",
              "HAVE_RWEBAUDIO": "1",
              "retroarch_link": true
            },
            "wasm": {
              "size_bytes": $(stat -c%s release/desmume2015_libretro.wasm),
              "sha256_zip": "$SHA256"
            },
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "github_ref": "${GITHUB_REF}",
            "github_run_id": "${GITHUB_RUN_ID}"
          }
          EOF
          cat release/build-info.json

      - name: Upload build artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: desmume2015-wasm-build
          path: release/

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/desmume2015_libretro.zip
            release/desmume2015_libretro.zip.sha256
            release/build-info.json
          generate_release_notes: true
          body: |
            ## DeSmuME 2015 libretro WASM build

            **Source**: `${{ github.ref_name }}`
            **Emscripten**: `${{ env.EMSCRIPTEN_VERSION }}`
            **SHA256**: `${{ env.SHA256 }}`

            ### Assets
            - `desmume2015_libretro.zip` — js + wasm pair
            - `desmume2015_libretro.zip.sha256` — sha256 sidecar
            - `build-info.json` — full build metadata

            ### Validation (γ checks)
            All passed: magic bytes, size > 1024, emcc ${{ env.EMSCRIPTEN_VERSION }} baked, libretro
            export symbols (retro_run, retro_load_game, retro_get_system_info,
            retro_init, retro_deinit, retro_set_environment).

            ### Pipeline
            Two-stage build:
            1. `emmake make -f Makefile.libretro platform=emscripten` (in `desmume/`) → `.bc`
            2. `cp *.bc RetroArch/libretro_emscripten.bc` + `emmake make -f Makefile.emscripten LIBRETRO=desmume2015` → `.js + .wasm`

            This mirrors the standard libretro core-build recipe (see
            RetroArch/pkg/emscripten/README.md) and is how LeonEmu's existing
            mgba/fceumm/snes9x/gpgx wasm assets were originally produced.

            ### jsDelivr access
            ```
            https://cdn.jsdelivr.net/gh/bigleon2026/desmume2015@${{ github.ref_name }}/release/desmume2015_libretro.zip
            ```
